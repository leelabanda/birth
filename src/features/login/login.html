<div class="login-container">

    <div class="login-card">

        <h1>DOB Tracker</h1>

        <p>Please Login</p>

        <form (ngSubmit)="login()">

            <div class="form-group">
                <label>Username</label>

                <input
                    type="text"
                    [(ngModel)]="username"
                    name="username"
                    placeholder="Enter Username"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>

                <input
                    type="password"
                    [(ngModel)]="password"
                    name="password"
                    placeholder="Enter Password"
                    required>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>
